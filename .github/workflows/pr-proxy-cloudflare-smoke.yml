name: PR Proxy Smoke

on:
  pull_request:
    branches:
      - main
      - master
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-proxy-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Proxy + Cloudflare Smoke Test
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm

      - name: Verify runner browser dependencies
        run: |
          set -euo pipefail
          command -v google-chrome
          command -v Xvfb
          google-chrome --version
          node --version
          npm --version

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci

      - name: Run end-to-end proxy smoke test
        env:
          CI: "true"
          DISPLAY: ""
        run: |
          set -euo pipefail
          npm run test:ci:proxy-cloudflare
