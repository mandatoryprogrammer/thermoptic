name: CI

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: docker-build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-15-intel
    env:
      GITHUB_TOKEN: ''
      GH_TOKEN: ''
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Docker on macOS
        if: runner.os == 'macOS'
        uses: docker/setup-docker-action@v5
        env:
          LIMA_START_ARGS: --cpus 4 --memory 8

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show Docker version
        run: docker version

      - name: Build thermoptic image
        run: docker buildx build --platform linux/amd64 --file Dockerfile --tag thermoptic-ci:root --load .

      - name: Build chrome image
        run: docker buildx build --platform linux/amd64 --file chrome/Dockerfile --tag thermoptic-ci:chrome --load ./chrome

      - name: Build proxyrouter image
        run: docker buildx build --platform linux/amd64 --file proxyrouter/Dockerfile --tag thermoptic-ci:proxyrouter --load ./proxyrouter

  compose-e2e:
    name: compose-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GITHUB_TOKEN: ''
      GH_TOKEN: ''
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare ignored runtime directories
        shell: bash
        run: mkdir -p ssl

      - name: Run compose smoke and Cloudflare hook validation
        shell: bash
        run: npm run ci:compose-smoke
